plugins {
    id 'com.android.library'
}

android {
    namespace 'com.bshashi.jsonbin'
    compileSdk 34

    defaultConfig {
        minSdk 21
        targetSdk 36
    }

    buildFeatures {
        buildConfig true
    }

    buildTypes {
        release {
            minifyEnabled false
        }
    }
}

dependencies {
    implementation 'com.squareup.retrofit2:converter-gson:2.9.0'
	implementation 'com.google.code.gson:gson:2.8.9'
}